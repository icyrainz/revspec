name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run test
      - run: bun run test:e2e
        env:
          REVSPEC_E2E_WAIT_MS: "200"
          REVSPEC_E2E_INIT_WAIT_MS: "500"
